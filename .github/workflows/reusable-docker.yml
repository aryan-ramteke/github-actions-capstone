name: docker build & push

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      tag:
        type: string
      docker_username:
        type: string
        required: true
    secrets:
      docker_token:
        required: true
    outputs:
      image_url: 
        description: "The complete docker image url including tag"
        value: ${{ jobs.build-push.outputs.image_url }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.set-url.outputs.image_url }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ inputs.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
              ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
              
      - name: Generate full image url output
        id: set-url
        run: |
            full_path=${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
            echo "image_url=$full_path" >> $GITHUB_OUTPUT
            echo "successfully built and pushed: $full_path"
    
