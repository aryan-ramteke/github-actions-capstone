name: on pr

on:
    pull_request:
        branches: [main]
        types: [opened,synchronize]

jobs:
    check-vulnerability:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: Check Dependencies for Vulnerabilities
              uses: actions/dependency-review-action@v4
              with:
                  fail-on-severity: critical

    call-build-test:
        needs: [check-vulnerability]
        uses: ./.github/workflows/reusable-build-test.yml
        with:
            python-version: 3.12
            run-tests: true

    pr-comment:
        needs: [call-build-test]
        runs-on: ubuntu-latest
        steps:
            - name: print summary
              run: |
                    if [ ${{ needs.call-build-test.outputs.test_result }} = 'passed' ];then
                    echo "PR checks passed for branch: ${{ github.head_ref }}"
                    else
                    echo "PR checks failed for branch: ${{ github.head_ref }}"
                    fi